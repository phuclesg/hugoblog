<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nam Kỳ Xưa - Trang quản trị</title>
</head>
<body>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.registerEditorComponent({
  id: "figure",
  label: "Chèn ảnh cloudflare R2",
  fields: [
    {name: 'src', label: 'Link hình ảnh', widget: 'string'},
    {name: 'alt', label: 'Mô tả (SEO)', widget: 'string'},
    {name: 'class', label: 'Chèn class', widget: 'string'}
  ],
  // Đoạn regex này giúp Decap "nhận diện" lệnh figure trong file .md
  pattern: /{{< figure src="([^"]*)" caption="([^"]*)" alt="([^"]*)" class="([^"]*)" >}}/,
  fromBlock: function(match) {
    return { src: match[1], caption: match[2], alt: match[2], class: match[3] };
  },
  toBlock: function(obj) {
    return `{{< figure src="${obj.src}" caption="${obj.alt}" alt="${obj.alt}" class="${obj.class}" >}}`;
  },
  // Đây là phần giúp nó hiện ra ảnh trong cửa sổ soạn thảo
  toPreview: function(obj) {
    return `
      <figure>
        <img src="https://media.namkyxua.com${obj.src}" style="max-width:100%; height:auto;">
        <figcaption style="text-align:center;">${obj.alt}</figcaption>
      </figure>
    `;
  }
});
  </script>
<script>
CMS.registerEditorComponent({
  id: "image",
  label: "Image",
  fields: [
    { name: "src", label: "Image", widget: "image" },
    { name: "alt", label: "Alt Text", widget: "string", required: false }
  ],
  pattern: /!\[(.*?)\]\((.*?)\)/,
  fromBlock: function(match) {
    return {
      src: match[2],
      alt: match[1]
    };
  },
  toBlock: function(obj) {
    const base = "https://media.namkyxua.com/images/";
    const src = obj.src.startsWith("http") ? obj.src : base + obj.src;
    return `![${obj.alt || ""}](${src})`;
  },
  toPreview: function(obj) {
    const base = "https://media.namkyxua.com/images/";
    const src = obj.src.startsWith("http") ? obj.src : base + obj.src;
    return `<img src="${src}" alt="${obj.alt || ""}" />`;
  }
});
</script>
  </body>
</html>
