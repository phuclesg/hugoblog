<div class="form-email flex flex-col items-center my-4">
    <h1 class="text-xl mb-4 uppercase font-bold">Liên lạc với tôi</h1>
    <form id="contact-form" class="flex flex-col gap-12">
    <input class="border-1 focus:outline-none border-[#e5e7eb] rounded-[16px] w-auto md:w-[400px] pl-[10px] h-12" type="text" name="name" placeholder="Nhập tên bạn" required />
    <input type="hidden" name="postTitle" value="{{ .Title }}"/>
    <input type="hidden" name="postUrl" value="{{ .Permalink }}"/>
    <input class="border-1 focus:outline-none border-[#e5e7eb] rounded-[16px] w-auto md:w-[400px] pl-[10px] h-12" type="email" name="email" placeholder="Nhâp Email bạn" required />
    <textarea class="border-1 focus:outline-none border-[#e5e7eb] p-3 rounded-2xl" name="message" placeholder="Nhập nội dung của bạn" required></textarea>
    <button class=" w-30 bg-[#ffb341] rounded-[16px] h-10 border-1 border-[#e5e7eb]" type="submit">Gửi</button>
    </form>
</div>
<div id="response-msg" style="display:none;">Cảm ơn bạn đã liên lạc!</div>
<script>
  const form = document.getElementById('contact-form');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData(form);

    const data = {
      name: formData.get('name'),
      email: formData.get('email'),
      message: formData.get('message'),
      title: formData.get('postTitle'),
      link: formData.get('postUrl')
    };

    try {
      const response = await fetch('/api/contact', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        form.style.display = 'none';
        document.getElementById('response-msg').style.display = 'block';
      } else {
        alert("Gửi thất bại");
      }
    } catch (err) {
      alert("Có lỗi xảy ra");
    }
  });
</script>
