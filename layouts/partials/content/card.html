{{- $currentSection := .Section -}}
{{- $sectionColors := .Site.Params.section_color -}}
{{- $color := index $sectionColors $currentSection | default $sectionColors.default -}}

<a href="{{ .Permalink }}" class="group block bg-zinc-100 rounded-lg">
	<article class="relative h-full transition-all group-hover:bg-[{{ $color }}]/30 rounded-lg border-t-[4px] border-[{{ $color }}] group-hover:translate-y-6">

		<figure class="w-full aspect-video overflow-hidden rounded-t-lg">

			{{- if .Params.image }}
			
			{{- $img := .Params.image -}}

			{{- if strings.HasPrefix $img "http" }}
				<!-- Nếu là URL hoàn chỉnh, dùng nguyên -->
				<img class="object-cover cursor-pointer" 
					src="{{ $img }}" 
					alt="{{ .Title }}" 
					style="width: 100%; height: 100%; object-fit: cover;">

			{{- else if strings.HasPrefix $img "/" }}
				<!-- Nếu là path bắt đầu bằng / (ví dụ /images/...), nối mediaBaseURL -->
				<img class="object-cover cursor-pointer" 
					src="{{ .Site.Params.mediaBaseURL }}{{ $img }}" 
					alt="{{ .Title }}" 
					style="width: 100%; height: 100%; object-fit: cover;">

			{{- else }}
				<!-- Nếu là local resource Hugo -->
				{{- with $imgRes := resources.Get $img -}}
				{{- $imgRes := $imgRes.Process "resize 750x" -}}
				<img class="object-cover cursor-pointer" 
					src="{{ $imgRes.Permalink }}" 
					alt="{{ .Title }}" 
					width="{{ $imgRes.Width }}" 
					height="{{ $imgRes.Height }}">
				{{- end }}
			{{- end }}

			{{- end }}

		</figure>

		<div class="p-6">
			<div class="flex">
				<h3 style="margin-right: 0.5rem;border: 1px solid;border-radius: 1.5rem;padding: 0 1rem;border-color: #e5e7eb;">
					{{ .CurrentSection.Title }}
				</h3>

				<time datetime="{{ .Date.Format "2006-01-02T15:04:05-07:00" | safeHTML }}">{{ .Date.Format "02/01/2006" }}</time>
			</div>
			<h3 class="my-4 text-xl font-bold">{{ .LinkTitle }}</h3>

			<p class="text-normal leading-normal text-zinc-500 line-clamp-2">{{ .Params.description }}</p>

		</div>
	</article>
</a>
